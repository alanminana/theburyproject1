document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

lock;\n  white-space: nowrap;\n  word-wrap: normal;\n  direction: ltr;\n  -webkit-font-feature-settings: 'liga';\n  -webkit-font-smoothing: antialiased;\n}\n<\u002Fstyle>\n<style>\n  html, body { font-family: 'Inter', system-ui, sans-serif; scroll-behavior: smooth; }\n  body { background: #0b1220; color: #e2e8f0; }\n  .font-mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-variant-numeric: tabular-nums; }\n  .material-symbols-outlined { font-variation-settings: 'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; vertical-align: middle; }\n  :focus-visible { outline: 2px solid #60a5fa; outline-offset: 2px; border-radius: 6px; }\n  input[type=\"radio\"], input[type=\"checkbox\"] { accent-color: #3b82f6; }\n  ::-webkit-scrollbar { width: 10px; height: 10px; }\n  ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 6px; }\n  ::-webkit-scrollbar-track { background: transparent; }\n\n  .card        { background: #111827; border: 1px solid #1f2937; border-radius: 14px; }\n  .card-sub    { background: #0f172a; border: 1px solid #1e2a3d; border-radius: 10px; }\n  .card-deep   { background: #0a1322; border: 1px solid #1a2638; border-radius: 8px; }\n\n  .field { background: #0f172a; border: 1px solid #243044; color: #e2e8f0; border-radius: 8px; padding: .6rem .8rem; width: 100%; font-size: .9rem; transition: border .15s, box-shadow .15s; }\n  .field:focus { border-color: #3b82f6; outline: none; box-shadow: 0 0 0 3px rgba(59,130,246,.18); }\n  .field-sm { padding: .4rem .6rem; font-size: .85rem; }\n  textarea.field { min-height: 70px; resize: vertical; }\n  .label { display: block; font-size: .75rem; font-weight: 500; color: #94a3b8; margin-bottom: .3rem; letter-spacing: .01em; }\n  .hint { font-size: .72rem; color: #64748b; margin-top: .3rem; line-height: 1.4; }\n\n  .btn { display: inline-flex; align-items: center; justify-content: center; gap: .4rem; padding: .55rem .95rem; border-radius: 9px; font-size: .85rem; font-weight: 500; transition: all .15s; min-height: 38px; cursor: pointer; border: 1px solid transparent; white-space: nowrap; }\n  .btn:disabled { opacity: .45; cursor: not-allowed; }\n  .btn-primary { background: #2563eb; color: white; }\n  .btn-primary:hover:not(:disabled){ background: #1d4ed8; }\n  .btn-success { background: #16a34a; color: white; }\n  .btn-success:hover:not(:disabled){ background: #15803d; }\n  .btn-ghost   { background: transparent; color: #cbd5e1; border-color: #334155; }\n  .btn-ghost:hover { background: #1e293b; color: white; }\n  .btn-soft    { background: #1e293b; color: #e2e8f0; border-color: #334155; }\n  .btn-soft:hover { background: #273549; }\n  .btn-xs { padding: .3rem .6rem; min-height: 30px; font-size: .72rem; border-radius: 7px; }\n  .btn-sm { padding: .4rem .75rem; min-height: 34px; font-size: .78rem; }\n  .btn-icon { width: 32px; min-height: 32px; padding: 0; }\n\n  .pill { display: inline-flex; align-items: center; gap: .3rem; padding: .2rem .55rem; border-radius: 999px; font-size: .7rem; font-weight: 500; border: 1px solid transparent; white-space: nowrap; }\n  .pill-green  { background: rgba(16,185,129,.12); color: #34d399; border-color: rgba(16,185,129,.3); }\n  .pill-amber  { background: rgba(245,158,11,.12); color: #fbbf24; border-color: rgba(245,158,11,.3); }\n  .pill-red    { background: rgba(239,68,68,.12);  color: #f87171; border-color: rgba(239,68,68,.3); }\n  .pill-blue   { background: rgba(59,130,246,.12); color: #60a5fa; border-color: rgba(59,130,246,.3); }\n  .pill-purple { background: rgba(168,85,247,.12); color: #c084fc; border-color: rgba(168,85,247,.3); }\n  .pill-cyan   { background: rgba(6,182,212,.12);  color: #67e8f9; border-color: rgba(6,182,212,.3); }\n  .pill-slate  { background: rgba(148,163,184,.10); color: #cbd5e1; border-color: rgba(148,163,184,.25); }\n\n  .switch { position: relative; display: inline-flex; align-items: center; cursor: pointer; gap: .5rem; }\n  .switch input { position: absolute; opacity: 0; pointer-events: none; }\n  .switch .track { width: 34px; height: 20px; background: #334155; border-radius: 999px; position: relative; transition: background .15s; flex-shrink: 0; }\n  .switch .knob { position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; background: #e2e8f0; border-radius: 999px; transition: transform .15s; }\n  .switch input:checked + .track { background: #16a34a; }\n  .switch input:checked + .track .knob { transform: translateX(14px); }\n  .switch.sw-amber input:checked + .track { background: #d97706; }\n  .switch .lbl { font-size: .78rem; color: #cbd5e1; }\n\n  /* Section nav */\n  .sec-nav-link { display: flex; align-items: center; gap: .6rem; padding: .5rem .65rem; border-radius: 9px; color: #94a3b8; font-size: .82rem; transition: all .12s; border: 1px solid transparent; cursor: pointer; width: 100%; text-align: left; }\n  .sec-nav-link:hover { background: #131e33; color: #e2e8f0; }\n  .sec-nav-link.active { background: linear-gradient(90deg, rgba(6,182,212,.16), rgba(6,182,212,.04)); border-color: rgba(6,182,212,.35); color: #f1f5f9; }\n  .sec-nav-link .num { width: 22px; height: 22px; border-radius: 6px; background: #1e293b; display: inline-flex; align-items: center; justify-content: center; font-size: .68rem; font-weight: 600; color: #94a3b8; flex-shrink: 0; transition: all .12s; }\n  .sec-nav-link.active .num { background: #06b6d4; color: #04222a; }\n\n  /* Section card — panel */\n  .sec { scroll-margin-top: 80px; }\n  .sec[hidden] { display: none; }\n  .sec-head { display: flex; align-items: flex-start; gap: .85rem; }\n  .sec-ico { width: 40px; height: 40px; border-radius: 11px; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }\n  .sec-tag { font-size: .68rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: #64748b; }\n\n  /* Segmented control */\n  .seg { display: inline-flex; background: #0a1322; border: 1px solid #243044; border-radius: 9px; padding: 3px; gap: 2px; }\n  .seg button { padding: .4rem .8rem; border-radius: 6px; font-size: .8rem; font-weight: 500; color: #94a3b8; transition: all .12s; cursor: pointer; }\n  .seg button[aria-pressed=\"true\"] { background: #2563eb; color: white; }\n\n  /* Score table */\n  .score-grid { display: grid; grid-template-columns: 52px 1fr 140px 92px 56px; gap: 0; }\n  #score-body { display: contents; }\n  .score-grid .gh { font-size: .64rem; text-transform: uppercase; letter-spacing: .04em; color: #64748b; font-weight: 600; padding: .4rem .55rem; border-bottom: 1px solid #1e2a3d; }\n  .score-row { display: contents; }\n  .score-row > div { padding: .28rem .55rem; border-bottom: 1px solid #131e33; display: flex; align-items: center; }\n  .score-row:hover > div { background: rgba(6,182,212,.04); }\n  .score-row.off > div { opacity: .45; }\n  .score-chip { width: 26px; height: 26px; border-radius: 7px; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; font-family:'JetBrains Mono', monospace; font-size: .8rem; flex-shrink: 0; }\n  .ramp { height: 6px; border-radius: 999px; background: linear-gradient(90deg,#06b6d4,#3b82f6); min-width: 3px; transition: width .3s; }\n  .ramp-track { flex: 1; height: 6px; border-radius: 999px; background: #0a1322; overflow: hidden; }\n  .mini-input { background: #0f172a; border: 1px solid #243044; color: #e2e8f0; border-radius: 6px; padding: .25rem .5rem; font-size: .8rem; width: 100%; }\n  .mini-input:focus { border-color: #3b82f6; outline: none; }\n\n  /* Approval band */\n  .band { height: 46px; border-radius: 10px; display: flex; overflow: hidden; border: 1px solid #1e2a3d; }\n  .band > div { display: flex; align-items: center; justify-content: center; font-size: .75rem; font-weight: 600; position: relative; gap: .35rem; }\n  .band-marker { position: absolute; top: -6px; bottom: -6px; width: 2px; background: #f8fafc; }\n  .band-marker::after { content: attr(data-v); position: absolute; top: -20px; left: 50%; transform: translateX(-50%); font-size: .65rem; font-family:'JetBrains Mono',monospace; color: #f8fafc; background:#1e293b; padding: 1px 5px; border-radius: 5px; white-space: nowrap; }\n\n  details > summary { list-style: none; cursor: pointer; }\n  details > summary::-webkit-details-marker { display: none; }\n  details[open] .chev { transform: rotate(180deg); }\n  .chev { transition: transform .2s; }\n\n  .modal-backdrop { background: rgba(2,6,18,.7); backdrop-filter: blur(2px); }\n  .modal-card { animation: modalIn .18s ease; }\n  @keyframes modalIn { from { opacity:0; transform: translateY(8px);} to { opacity:1; transform: translateY(0);} }\n\n  .notice { border: 1px solid rgba(6,182,212,.3); background: rgba(6,182,212,.06); border-radius: 12px; padding: .85rem 1rem; display: flex; gap: .85rem; align-items: flex-start; }\n  .notice-warn { border-color: rgba(245,158,11,.35); background: rgba(245,158,11,.05); }\n\n  .stat { background: #0f172a; border: 1px solid #1e2a3d; border-radius: 11px; padding: .85rem .95rem; }\n  .divider-soft { border-top: 1px dashed #1e2a3d; }\n\n  /* Profile row */\n  .profile { border: 1px solid #1e2a3d; background:#0f172a; border-radius: 11px; overflow: hidden; }\n  .profile summary { display: flex; align-items: center; gap: .8rem; padding: .85rem 1rem; }\n  .profile[open] summary { border-bottom: 1px solid #1e2a3d; background: linear-gradient(180deg,#131e33,#0f172a); }\n\n  /* Save bar */\n  .savebar { position: sticky; bottom: 0; z-index: 30; backdrop-filter: blur(10px); background: rgba(11,18,32,.9); border-top: 1px solid #1f2937; }\n<\u002Fstyle>\n<\u002Fhead>\n<body class=\"min-h-screen pb-2\">\n\n\n<div id=\"toast\" class=\"hidden fixed top-4 right-4 z-[80] max-w-sm\" aria-live=\"polite\"><\u002Fdiv>\n\n<!-- HEADER -->\n<header class=\"border-b border-slate-800 bg-slate-950/40\">\n  <div class=\"max-w-[1400px] mx-auto px-4 sm:px-6 py-5\">\n    <nav aria-label=\"Breadcrumb\" class=\"text-xs text-slate-500 flex items-center gap-1.5\">\n      <a href=\"Centro de ventas.html\" class=\"hover:text-slate-300\">Ventas<\u002Fa>\n      <span class=\"material-symbols-outlined\" style=\"font-size:14px\">chevron_right<\u002Fspan>\n      <a href=\"Configuración de pagos.html\" class=\"hover:text-slate-300\">Configuración de pagos<\u002Fa>\n      <span class=\"material-symbols-outlined\" style=\"font-size:14px\">chevron_right<\u002Fspan>\n      <span class=\"text-slate-300\">Crédito personal<\u002Fspan>\n    <\u002Fnav>\n    <div class=\"mt-2 flex flex-col lg:flex-row lg:items-start lg:justify-between gap-4\">\n      <div class=\"min-w-0 max-w-3xl\">\n        <div class=\"flex items-center gap-3\">\n          <div class=\"w-10 h-10 rounded-xl bg-cyan-500/10 border border-cyan-500/30 flex items-center justify-center shrink-0\">\n            <span class=\"material-symbols-outlined text-cyan-300\">request_quote<\u002Fspan>\n          <\u002Fdiv>\n          <h1 class=\"text-2xl font-semibold text-white tracking-tight\">Configuración de Crédito Personal<\u002Fh1>\n          <span class=\"pill pill-green\"><span class=\"w-1.5 h-1.5 rounded-full bg-emerald-400\"><\u002Fspan> Módulo habilitado<\u002Fspan>\n        <\u002Fdiv>\n        <p class=\"mt-2 text-sm text-slate-400\">\n          El puntaje del cliente (0–10) define cuánto puede financiar. El monto se paga en cuotas calculadas con tasa, gastos y plazo.\n          Si la cuota es alta respecto al ingreso, requiere análisis o se rechaza; según monto o riesgo, se exige garante.\n        <\u002Fp>\n      <\u002Fdiv>\n      <div class=\"flex flex-wrap gap-2 shrink-0\">\n        <label class=\"switch\">\n          <input type=\"checkbox\" checked=\"\">\n          <span class=\"track\"><span class=\"knob\"><\u002Fspan><\u002Fspan>\n          <span class=\"lbl\">Módulo habilitado<\u002Fspan>\n        <\u002Flabel>\n        <button class=\"btn btn-soft btn-sm\" onclick=\"openModal('m-historial')\">\n          <span class=\"material-symbols-outlined\" style=\"font-size:16px\">history<\u002Fspan> Historial\n        <\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<!-- BODY: nav + content -->\n<div class=\"max-w-[1400px] mx-auto px-4 sm:px-6 py-6\">\n<div class=\"grid grid-cols-1 lg:grid-cols-[230px_1fr] gap-6\">\n\n  <!-- ===== NAV LATERAL ===== -->\n  <aside class=\"self-start lg:sticky lg:top-4 hidden lg:block\">\n    <div class=\"card p-2.5\">\n      <p class=\"text-[11px] uppercase tracking-wider text-slate-500 font-semibold px-2 pt-1 pb-2\">Secciones<\u002Fp>\n      <nav id=\"sec-nav\" class=\"space-y-0.5\">\n        <button class=\"sec-nav-link\" data-target=\"s1\"><span class=\"num\">1<\u002Fspan> Resumen operativo<\u002Fbutton>\n        <button class=\"sec-nav-link\" data-target=\"s2\"><span class=\"num\">2<\u002Fspan> Config. financiera<\u002Fbutton>\n        <button class=\"sec-nav-link\" data-target=\"s3\"><span class=\"num\">3<\u002Fspan> Monto por puntaje<\u002Fbutton>\n        <button class=\"sec-nav-link\" data-target=\"s4\"><span class=\"num\">4<\u002Fspan> Reglas de aprobación<\u002Fbutton>\n        <button class=\"sec-nav-link\" data-target=\"s5\"><span class=\"num\">5<\u002Fspan> Requisitos y garante<\u002Fbutton>\n        <div class=\"my-2 mx-2 divider-soft\"><\u002Fdiv>\n        <p class=\"text-[10px] uppercase tracking-wider text-slate-600 font-semibold px-2 pb-1\">Avanzado<\u002Fp>\n        <button class=\"sec-nav-link\" data-target=\"s6\"><span class=\"num\">6<\u002Fspan> Perfiles de crédito<\u002Fbutton>\n        <button class=\"sec-nav-link\" data-target=\"s7\"><span class=\"num\">7<\u002Fspan> Semáforo visual<\u002Fbutton>\n        <button class=\"sec-nav-link\" data-target=\"s8\"><span class=\"num\">8<\u002Fspan> Config. avanzada<\u002Fbutton>\n      <\u002Fnav>\n    <\u002Fdiv>\n    <div class=\"mt-3 px-1\">\n      <p class=\"text-[11px] text-slate-500 leading-relaxed\">Los cambios se guardan por sección. Usá la barra inferior para guardar todo de una vez.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Faside>\n\n  <!-- ===== CONTENIDO ===== -->\n  <main class=\"space-y-6 min-w-0\">\n\n    <!-- selector mobile -->\n    <div class=\"lg:hidden\">\n      <label class=\"label\">Sección<\u002Flabel>\n      <select id=\"msel\" class=\"field\">\n        <option value=\"s1\">1 · Resumen operativo<\u002Foption>\n        <option value=\"s2\">2 · Config. financiera<\u002Foption>\n        <option value=\"s3\">3 · Monto por puntaje<\u002Foption>\n        <option value=\"s4\">4 · Reglas de aprobación<\u002Foption>\n        <option value=\"s5\">5 · Requisitos y garante<\u002Foption>\n        <option value=\"s6\">6 · Perfiles de crédito<\u002Foption>\n        <option value=\"s7\">7 · Semáforo visual<\u002Foption>\n        <option value=\"s8\">8 · Config. avanzada<\u002Foption>\n      <\u002Fselect>\n    <\u002Fdiv>\n\n    <!-- ============ 1 · RESUMEN OPERATIVO ============ -->\n    <section id=\"s1\" class=\"sec card p-5\">\n      <div class=\"sec-head\">\n        <div class=\"sec-ico\" style=\"background:rgba(6,182,212,.12);color:#67e8f9;\">\n          <span class=\"material-symbols-outlined\">dashboard<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"flex-1 min-w-0\">\n          <div class=\"sec-tag\">Sección 1<\u002Fdiv>\n          <h2 class=\"text-lg font-semibold text-white\">Resumen operativo<\u002Fh2>\n          <p class=\"text-sm text-slate-400 mt-0.5\">Vista rápida de cómo está configurado el crédito. Se actualiza con los valores de abajo.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"mt-4 grid grid-cols-2 md:grid-cols-3 xl:grid-cols-5 gap-3\">\n        <div class=\"stat\">\n          <div class=\"flex items-center gap-1.5 text-[11px] uppercase tracking-wide text-slate-500\"><span class=\"material-symbols-outlined text-blue-400\" style=\"font-size:14px\">percent<\u002Fspan> Tasa mensual<\u002Fdiv>\n          <div class=\"mt-1.5 text-2xl font-semibold text-white font-mono\" id=\"r-tasa\">3,00 %<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"stat\">\n          <div class=\"flex items-center gap-1.5 text-[11px] uppercase tracking-wide text-slate-500\"><span class=\"material-symbols-outlined text-cyan-300\" style=\"font-size:14px\">view_timeline<\u002Fspan> Cuotas permitidas<\u002Fdiv>\n          <div class=\"mt-1.5 text-2xl font-semibold text-white font-mono\" id=\"r-cuotas\">1 – 24<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"stat\">\n          <div class=\"flex items-center gap-1.5 text-[11px] uppercase tracking-wide text-slate-500\"><span class=\"material-symbols-outlined text-amber-400\" style=\"font-size:14px\">supervisor_account<\u002Fspan> Exige garante desde<\u002Fdiv>\n          <div class=\"mt-1.5 text-2xl font-semibold text-white font-mono\" id=\"r-garante\">$ 500.000<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"stat\">\n          <div class=\"flex items-center gap-1.5 text-[11px] uppercase tracking-wide text-slate-500\"><span class=\"material-symbols-outlined text-emerald-400\" style=\"font-size:14px\">check_circle<\u002Fspan> Puntaje aprobado<\u002Fdiv>\n          <div class=\"mt-1.5 text-2xl font-semibold text-white font-mono\" id=\"r-aprob\">70<span class=\"text-slate-500 text-base\">/100<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"stat\">\n          <div class=\"flex items-center gap-1.5 text-[11px] uppercase tracking-wide text-slate-500\"><span class=\"material-symbols-outlined text-amber-300\" style=\"font-size:14px\">pending<\u002Fspan> Puntaje análisis<\u002Fdiv>\n          <div class=\"mt-1.5 text-2xl font-semibold text-white font-mono\" id=\"r-anal\">50<span class=\"text-slate-500 text-base\">/100<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"mt-3 notice\">\n        <span class=\"material-symbols-outlined text-cyan-300 mt-0.5\">lightbulb<\u002Fspan>\n        <div class=\"text-sm text-slate-300\">\n          <strong class=\"text-slate-100\">Lógica del módulo:<\u002Fstrong>\n          el puntaje 0–10 define el monto máximo financiable → el monto se paga en cuotas (tasa + gastos) → si la relación cuota/ingreso es alta se exige análisis o se rechaza → si el monto o el riesgo son altos se pide garante.\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============ 2 · CONFIG FINANCIERA BASE ============ -->\n    <section id=\"s2\" class=\"sec card p-5\">\n      <div class=\"sec-head\">\n        <div class=\"sec-ico\" style=\"background:rgba(59,130,246,.12);color:#60a5fa;\">\n          <span class=\"material-symbols-outlined\">calculate<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"flex-1 min-w-0\">\n          <div class=\"sec-tag\">Sección 2<\u002Fdiv>\n          <h2 class=\"text-lg font-semibold text-white\">Configuración financiera base<\u002Fh2>\n          <p class=\"text-sm text-slate-400 mt-0.5\">Define cómo se calcula la cuota: tasa, gastos administrativos y rango de cuotas.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"mt-4 grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-4\">\n        <div>\n          <label class=\"label\" for=\"f-tasa\">Tasa mensual (%)<\u002Flabel>\n          <div class=\"relative\">\n            <input id=\"f-tasa\" type=\"number\" step=\"0.0001\" value=\"3.0000\" class=\"field font-mono pr-9\" oninput=\"syncResumen()\">\n            <span class=\"absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 text-sm font-mono\">%<\u002Fspan>\n          <\u002Fdiv>\n          <p class=\"hint\">Tasa nominal mensual aplicada sobre el capital financiado. TEA ≈ <span class=\"font-mono text-slate-300\">42,58 %<\u002Fspan><\u002Fp>\n        <\u002Fdiv>\n\n        <div>\n          <label class=\"label\">Gastos administrativos<\u002Flabel>\n          <div class=\"flex gap-2\">\n            <div class=\"seg\" id=\"seg-gasto\">\n              <button type=\"button\" aria-pressed=\"true\" data-mode=\"fijo\" onclick=\"setGastoMode('fijo')\">Monto fijo<\u002Fbutton>\n              <button type=\"button\" aria-pressed=\"false\" data-mode=\"porc\" onclick=\"setGastoMode('porc')\">Porcentaje<\u002Fbutton>\n            <\u002Fdiv>\n            <div class=\"relative flex-1\">\n              <span id=\"gasto-prefix\" class=\"absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-sm font-mono\">$<\u002Fspan>\n              <span id=\"gasto-suffix\" class=\"hidden absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 text-sm font-mono\">%<\u002Fspan>\n              <input id=\"f-gasto\" type=\"number\" value=\"0\" class=\"field font-mono pl-7\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <p class=\"hint\" id=\"gasto-hint\">Monto fijo en pesos que se suma al capital al otorgar el crédito.<\u002Fp>\n        <\u002Fdiv>\n\n        <div>\n          <label class=\"label\">Cuotas permitidas<\u002Flabel>\n          <div class=\"flex items-center gap-2\">\n            <div class=\"flex-1\">\n              <span class=\"text-[11px] text-slate-500\">Desde<\u002Fspan>\n              <input id=\"f-cmin\" type=\"number\" min=\"1\" value=\"1\" class=\"field font-mono mt-1\" oninput=\"syncResumen()\">\n            <\u002Fdiv>\n            <span class=\"material-symbols-outlined text-slate-600 mt-5\">arrow_forward<\u002Fspan>\n            <div class=\"flex-1\">\n              <span class=\"text-[11px] text-slate-500\">Hasta<\u002Fspan>\n              <input id=\"f-cmax\" type=\"number\" min=\"1\" value=\"24\" class=\"field font-mono mt-1\" oninput=\"syncResumen()\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <p class=\"hint\">Rango global. Cada perfil puede acotarlo en su propia configuración.<\u002Fp>\n        <\u002Fdiv>\n\n        <div class=\"flex items-end\">\n          <div class=\"card-sub p-3 w-full flex items-center justify-between\">\n            <div>\n              <div class=\"text-sm text-slate-200 font-medium\">Estado del cálculo financiero<\u002Fdiv>\n              <div class=\"text-xs text-slate-500\">Si está inactivo, no se podrá otorgar crédito personal.<\u002Fdiv>\n            <\u002Fdiv>\n            <label class=\"switch\"><input type=\"checkbox\" checked=\"\"><span class=\"track\"><span class=\"knob\"><\u002Fspan><\u002Fspan><\u002Flabel>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"mt-5 divider-soft pt-4 flex justify-end gap-2\">\n        <button class=\"btn btn-ghost btn-sm\">Restablecer<\u002Fbutton>\n        <button class=\"btn btn-primary btn-sm\" onclick=\"toast('Configuración financiera guardada','ok')\">\n          <span class=\"material-symbols-outlined\" style=\"font-size:16px\">save<\u002Fspan> Guardar configuración financiera\n        <\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============ 3 · MONTO POR PUNTAJE ============ -->\n    <section id=\"s3\" class=\"sec card p-5\" style=\"border-color: rgba(6,182,212,.3);\">\n      <div class=\"sec-head\">\n        <div class=\"sec-ico\" style=\"background:rgba(6,182,212,.14);color:#67e8f9;\">\n          <span class=\"material-symbols-outlined\">leaderboard<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"flex-1 min-w-0\">\n          <div class=\"flex items-center gap-2\">\n            <div class=\"sec-tag\">Sección 3<\u002Fdiv>\n            <span class=\"pill pill-cyan\"><span class=\"material-symbols-outlined\" style=\"font-size:12px\">star<\u002Fspan> Regla principal del negocio<\u002Fspan>\n          <\u002Fdiv>\n          <h2 class=\"text-lg font-semibold text-white\">Monto disponible por puntaje<\u002Fh2>\n          <p class=\"text-sm text-slate-400 mt-0.5\">El puntaje del cliente (0–10) define cuánto puede financiar. Es la regla que realmente usa el negocio.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"mt-4 card-deep p-1 overflow-x-auto\">\n        <div class=\"min-w-[640px]\">\n          <div class=\"score-grid\">\n            <div class=\"gh\">Puntaje<\u002Fdiv>\n            <div class=\"gh\">Monto máximo financiable<\u002Fdiv>\n            <div class=\"gh\">Requiere análisis<\u002Fdiv>\n            <div class=\"gh\">Activo<\u002Fdiv>\n            <div class=\"gh text-right pr-3\">—<\u002Fdiv>\n            <div id=\"score-body\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"mt-3 flex items-center justify-between flex-wrap gap-2\">\n        <p class=\"text-[11px] text-slate-500\">La barra muestra el monto relativo de cada escalón. Editá los montos directamente en la tabla.<\u002Fp>\n        <div class=\"flex gap-2\">\n          <button class=\"btn btn-ghost btn-xs\" onclick=\"toast('Rampa lineal aplicada','info');applyRamp()\"><span class=\"material-symbols-outlined\" style=\"font-size:14px\">trending_up<\u002Fspan> Autocompletar rampa<\u002Fbutton>\n          <button class=\"btn btn-primary btn-sm\" onclick=\"toast('Montos por puntaje guardados','ok')\"><span class=\"material-symbols-outlined\" style=\"font-size:16px\">save<\u002Fspan> Guardar montos<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============ 4 · REGLAS DE APROBACIÓN ============ -->\n    <section id=\"s4\" class=\"sec card p-5\">\n      <div class=\"sec-head\">\n        <div class=\"sec-ico\" style=\"background:rgba(16,185,129,.12);color:#34d399;\">\n          <span class=\"material-symbols-outlined\">rule<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"flex-1 min-w-0\">\n          <div class=\"sec-tag\">Sección 4<\u002Fdiv>\n          <h2 class=\"text-lg font-semibold text-white\">Reglas de aprobación crediticia<\u002Fh2>\n          <p class=\"text-sm text-slate-400 mt-0.5\">Define si el cliente queda Aprobado, Requiere análisis o Rechazado.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Banda visual -->\n      <div class=\"mt-4\">\n        <div class=\"band relative\" id=\"approval-band\">\n          <div style=\"background:rgba(239,68,68,.18);color:#f87171;flex:50;\">\n            <span class=\"material-symbols-outlined\" style=\"font-size:15px\">cancel<\u002Fspan> Rechazado\n          <\u002Fdiv>\n          <div style=\"background:rgba(245,158,11,.18);color:#fbbf24;flex:20;\">\n            <span class=\"material-symbols-outlined\" style=\"font-size:15px\">pending<\u002Fspan> Requiere análisis\n          <\u002Fdiv>\n          <div style=\"background:rgba(16,185,129,.18);color:#34d399;flex:30;\">\n            <span class=\"material-symbols-outlined\" style=\"font-size:15px\">check_circle<\u002Fspan> Aprobado\n          <\u002Fdiv>\n          <div class=\"band-marker\" id=\"mk-anal\" data-v=\"50\" style=\"left:50%\"><\u002Fdiv>\n          <div class=\"band-marker\" id=\"mk-aprob\" data-v=\"70\" style=\"left:70%\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"flex justify-between text-[10px] font-mono text-slate-600 mt-1.5 px-0.5\">\n          <span>0<\u002Fspan><span>100 · puntaje de scoring interno<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"mt-5 grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-4\">\n        <div>\n          <label class=\"label\" for=\"a-aprob\">Puntaje mínimo para Aprobado<\u002Flabel>\n          <input id=\"a-aprob\" type=\"number\" min=\"0\" max=\"100\" value=\"70\" class=\"field font-mono\" oninput=\"syncBand()\">\n        <\u002Fdiv>\n        <div>\n          <label class=\"label\" for=\"a-anal\">Puntaje mínimo para Requiere Análisis<\u002Flabel>\n          <input id=\"a-anal\" type=\"number\" min=\"0\" max=\"100\" value=\"50\" class=\"field font-mono\" oninput=\"syncBand()\">\n        <\u002Fdiv>\n        <div>\n          <label class=\"label\" for=\"a-ratio\">Relación cuota / ingreso máxima<\u002Flabel>\n          <input id=\"a-ratio\" type=\"number\" step=\"0.0001\" value=\"0.3500\" class=\"field font-mono\">\n          <p class=\"hint\">Ej. 0,3500 = la cuota no puede superar el 35 % del ingreso declarado.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <label class=\"label\" for=\"a-riesgo\">Puntaje de riesgo mínimo<\u002Flabel>\n          <input id=\"a-riesgo\" type=\"number\" step=\"0.01\" value=\"3.00\" class=\"field font-mono\">\n          <p class=\"hint\">Si el riesgo es menor a este valor → rechazo directo.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"mt-4 notice\">\n        <span class=\"material-symbols-outlined text-cyan-300 mt-0.5\">info<\u002Fspan>\n        <div class=\"text-sm text-slate-300 space-y-0.5\">\n          <div>Si el puntaje es <strong class=\"text-emerald-300\">≥ 70<\u002Fstrong> → Aprobado.<\u002Fdiv>\n          <div>Entre <strong class=\"text-amber-300\">50 y 69<\u002Fstrong> → Requiere análisis.<\u002Fdiv>\n          <div>Por debajo de <strong class=\"text-red-300\">50<\u002Fstrong> → Rechazado.<\u002Fdiv>\n          <div class=\"text-slate-400 text-xs pt-1\">El puntaje 0–10 (sección 3) define el monto; este puntaje 0–100 es el scoring interno de aprobación.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"mt-5 divider-soft pt-4 flex justify-end gap-2\">\n        <button class=\"btn btn-ghost btn-sm\">Restablecer<\u002Fbutton>\n        <button class=\"btn btn-primary btn-sm\" onclick=\"toast('Reglas de aprobación guardadas','ok')\">\n          <span class=\"material-symbols-outlined\" style=\"font-size:16px\">save<\u002Fspan> Guardar reglas\n        <\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============ 5 · REQUISITOS Y GARANTE ============ -->\n    <section id=\"s5\" class=\"sec card p-5\">\n      <div class=\"sec-head\">\n        <div class=\"sec-ico\" style=\"background:rgba(245,158,11,.12);color:#fbbf24;\">\n          <span class=\"material-symbols-outlined\">verified_user<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"flex-1 min-w-0\">\n          <div class=\"sec-tag\">Sección 5<\u002Fdiv>\n          <h2 class=\"text-lg font-semibold text-white\">Requisitos y garante<\u002Fh2>\n          <p class=\"text-sm text-slate-400 mt-0.5\">Cuándo pedir más documentación o un garante.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"mt-4 grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-4\">\n        <div>\n          <label class=\"label\" for=\"g-monto\">Monto desde el cual exige garante<\u002Flabel>\n          <div class=\"relative\">\n            <span class=\"absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-sm font-mono\">$<\u002Fspan>\n            <input id=\"g-monto\" type=\"number\" value=\"500000\" class=\"field font-mono pl-7\" oninput=\"syncResumen()\">\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <label class=\"label\" for=\"g-punt\">Requerir garante si el puntaje (0–10) es menor a<\u002Flabel>\n          <input id=\"g-punt\" type=\"number\" min=\"0\" max=\"10\" value=\"6\" class=\"field font-mono\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"mt-4 card-sub p-3.5\">\n        <p class=\"text-xs uppercase tracking-wide text-slate-500 font-semibold mb-2\">Condiciones obligatorias<\u002Fp>\n        <div class=\"grid grid-cols-1 sm:grid-cols-2 gap-x-6 gap-y-2.5\">\n          <label class=\"flex items-center gap-2.5 text-sm text-slate-300 cursor-pointer\"><input type=\"checkbox\" checked=\"\" class=\"w-4 h-4\"> Requerir garante si el resultado es “Requiere análisis”<\u002Flabel>\n          <label class=\"flex items-center gap-2.5 text-sm text-slate-300 cursor-pointer\"><input type=\"checkbox\" checked=\"\" class=\"w-4 h-4\"> Requerir recibo de sueldo<\u002Flabel>\n          <label class=\"flex items-center gap-2.5 text-sm text-slate-300 cursor-pointer\"><input type=\"checkbox\" checked=\"\" class=\"w-4 h-4\"> Requerir consulta Veraz<\u002Flabel>\n          <label class=\"flex items-center gap-2.5 text-sm text-slate-300 cursor-pointer\"><input type=\"checkbox\" class=\"w-4 h-4\"> Requerir cónyuge<\u002Flabel>\n          <label class=\"flex items-center gap-2.5 text-sm text-slate-300 cursor-pointer\"><input type=\"checkbox\" class=\"w-4 h-4\"> Requerir servicio a nombre del cliente<\u002Flabel>\n          <label class=\"flex items-center gap-2.5 text-sm text-slate-300 cursor-pointer\"><input type=\"checkbox\" class=\"w-4 h-4\"> Requerir foto del DNI (frente y dorso)<\u002Flabel>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"mt-5 divider-soft pt-4 flex justify-end gap-2\">\n        <button class=\"btn btn-ghost btn-sm\">Restablecer<\u002Fbutton>\n        <button class=\"btn btn-primary btn-sm\" onclick=\"toast('Requisitos guardados','ok')\">\n          <span class=\"material-symbols-outlined\" style=\"font-size:16px\">save<\u002Fspan> Guardar requisitos\n        <\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ====== Separador avanzado ====== -->\n\n    <!-- ============ 6 · PERFILES DE CRÉDITO ============ -->\n    <section id=\"s6\" class=\"sec card p-5\">\n      <div class=\"sec-head\">\n        <div class=\"sec-ico\" style=\"background:rgba(168,85,247,.12);color:#c084fc;\">\n          <span class=\"material-symbols-outlined\">groups<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"flex-1 min-w-0\">\n          <div class=\"sec-tag\">Sección 6 · opcional<\u002Fdiv>\n          <h2 class=\"text-lg font-semibold text-white\">Perfiles de crédito<\u002Fh2>\n          <p class=\"text-sm text-slate-400 mt-0.5\">Reglas diferentes por tipo de cliente. Si no usás perfiles, se aplica la config base.<\u002Fp>\n        <\u002Fdiv>\n        <span class=\"pill pill-purple shrink-0\">2 perfiles<\u002Fspan>\n      <\u002Fdiv>\n\n        <div class=\"mt-4 space-y-3\">\n          <div class=\"flex justify-end\">\n            <button class=\"btn btn-soft btn-sm\" onclick=\"openModal('m-perfil')\"><span class=\"material-symbols-outlined\" style=\"font-size:16px\">add<\u002Fspan> Nuevo perfil<\u002Fbutton>\n          <\u002Fdiv>\n\n          <!-- Perfil estándar -->\n          <details class=\"profile\" open=\"\">\n            <summary>\n              <span class=\"w-9 h-9 rounded-lg bg-blue-500/1 utton>\n            <button class=\"btn btn-primary btn-sm\" onclick=\"toast('Configuración avanzada guardada','ok')\"><span class=\"material-symbols-outlined\" style=\"font-size:16px\">save<\u002Fspan> Guardar configuración avanzada<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n    <\u002Fsection>\n\n  <\u002Fmain>\n<\u002Fdiv>\n<\u002Fdiv>\n\n<!-- SAVE BAR -->\n<div class=\"savebar\">\n  <div class=\"max-w-[1400px] mx-auto px-4 sm:px-6 py-3 flex items-center justify-between gap-3 flex-wrap\">\n    <p class=\"text-xs text-slate-500 flex items-center gap-1.5\"><span class=\"material-symbols-outlined text-amber-400\" style=\"font-size:15px\">edit_note<\u002Fspan> Tenés cambios sin guardar en <span class=\"text-slate-300\">Config. financiera<\u002Fspan> y <span class=\"text-slate-300\">Reglas<\u002Fspan>.<\u002Fp>\n    <div class=\"flex gap-2\">\n      <button class=\"btn btn-ghost btn-sm\">Descartar todo<\u002Fbutton>\n      <button class=\"btn btn-success btn-sm\" onclick=\"toast('Toda la configuración fue guardada','ok')\"><span class=\"material-symbols-outlined\" style=\"font-size:16px\">save<\u002Fspan> Guardar todo<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- MODAL: Nuevo perfil -->\n<div id=\"m-perfil\" class=\"hidden fixed inset-0 z-50 modal-backdrop flex items-center justify-center p-4\">\n  <div class=\"modal-card card p-6 w-full max-w-lg\">\n    <header class=\"flex items-start justify-between gap-3 mb-4\">\n      <div>\n        <h3 class=\"text-lg font-semibold text-white\">Nuevo perfil de crédito<\u002Fh3>\n        <p class=\"text-xs text-slate-500 mt-0.5\">Reglas específicas para un tipo de cliente.<\u002Fp>\n      <\u002Fdiv>\n      <button class=\"btn btn-ghost btn-icon\" onclick=\"closeModal('m-perfil')\"><span class=\"material-symbols-outlined\">close<\u002Fspan><\u002Fbutton>\n    <\u002Fheader>\n    <div class=\"grid grid-cols-1 sm:grid-cols-2 gap-x-4 gap-y-3\">\n      <div class=\"sm:col-span-2\"><label class=\"l configuración de crédito personal.<\u002Fp>\n      <\u002Fdiv>\n      <button class=\"btn btn-ghost btn-icon\" onclick=\"closeModal('m-historial')\"><span class=\"material-symbols-outlined\">close<\u002Fspan><\u002Fbutton>\n    <\u002Fheader>\n    <ol class=\"relative border-l border-slate-700 pl-5 space-y-4\">\n      <li><div class=\"absolute -left-[7px] w-3 h-3 rounded-full bg-blue-500 mt-1.5\"><\u002Fdiv><div class=\"text-sm text-slate-200\">Tasa mensual <span class=\"font-mono\">2,50 → 3,00 %<\u002Fspan><\u002Fdiv><div class=\"text-xs text-slate-500\">Admin · 28/05/2026 09:12<\u002Fdiv><\u002Fli>\n      <li><div class=\"absolute -left-[7px] w-3 h-3 rounded-full bg-cyan-500 mt-1.5\"><\u002Fdiv><div class=\"text-sm text-slate-200\">Monto puntaje <span class=\"font-mono\">10<\u002Fspan> ajustado a <span class=\"font-mono\">$1.200.000<\u002Fspan><\u002Fdiv><div class=\"text-xs text-slate-500\">J. Pérez · 27/05/2026 16:40<\u002Fdiv><\u002Fli>\n      <li><div class=\"absolute -left-[7px] w-3 h-3 rounded-full bg-emerald-500 mt-1.5\"><\u002Fdiv><div class=\"text-sm text-slate-200\">Puntaje mínimo aprobado <span class=\"font-mono\">65 → 70<\u002Fspan><\u002Fdiv><div class=\"text-xs text-slate-500\">Admin · 26/05/2026 11:05<\u002Fdiv><\u002Fli>\n    <\u002Fol>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n  // ===== Datos tabla puntaje =====\n  const scoreData = [\n    {p:0,  monto:0,       anal:true,  on:true},\n    {p:1,  monto:0,       anal:true,  on:true},\n    {p:2,  monto:50000,   anal:true,  on:true},\n    {p:3,  monto:100000,  anal:true,  on:true},\n    {p:4,  monto:150000,  anal:true,  on:true},\n    {p:5,  monto:250000,  anal:false, on:true},\n    {p:6,  monto:350000,  anal:false, on:true},\n    {p:7,  monto:500000,  anal:false, on:true},\n    {p:8,  monto:700000,  anal:false, on:true},\n    {p:9,  monto:900000,  anal:false, on:true},\n    {p:10, monto:1200000, anal:false, on:true},\n  ];\n  const fmt = n => '$ ' + (n||0).toLocaleString('es-AR');\n  function scoreColor(p){\n    if (p<=2) return ['rgba(239,68,68,.15)','#f87171'];\n    if (p<=4) return ['rgba(245,158,11,.15)','#fbbf24'];\n    if (p<=6) return ['rgba(59,130,246,.15)','#60a5fa'];\n    return ['rgba(16,185,129,.15)','#34d399'];\n  }\n  function renderScore(){\n    const max = Math.max(...scoreData.map(r=>r.monto)) || 1;\n    const body = document.getElementById('score-body');\n    body.innerHTML = scoreData.map((r,i) => {\n      const [bg,fg] = scoreColor(r.p);\n      const w = Math.max(2, Math.round(r.monto/max*100));\n      return `<div class=\"score-row ${r.on?'':'off'}\">\n        <div><span class=\"score-chip\" style=\"background:${bg};color:${fg}\">${r.p}<\u002Fspan><\u002Fdiv>\n        <div class=\"gap-2\">\n          <div class=\"ramp-track\"><div class=\"ramp\" style=\"width:${w}%\"><\u002Fdiv><\u002Fdiv>\n          <span class=\"font-mono text-xs text-slate-400 w-24 text-right shrink-0\">${fmt(r.monto)}<\u002Fspan>\n        <\u002Fdiv>\n        <div>\n          <div class=\"relative w-full\">\n            <span class=\"absolute left-2.5 top-1/2 -translate-y-1/2 text-slate-500 text-xs font-mono\">$<\u002Fspan>\n            <input class=\"mini-input font-mono pl-5\" type=\"number\" value=\"${r.monto}\" onchange=\"scoreData[${i}].monto=+this.value;renderScore();syncResumen()\">\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <label class=\"switch sw-amber\"><input type=\"checkbox\" ${r.anal?'checked':''} onchange=\"scoreData[${i}].anal=this.checked\"><span class=\"track\"><span class=\"knob\"><\u002Fspan><\u002Fspan><span class=\"lbl\">${r.anal?'Sí':'No'}<\u002Fspan><\u002Flabel>\n        <\u002Fdiv>\n        <div class=\"justify-end pr-3\">\n          <label class=\"switch\"><input type=\"checkbox\" ${r.on?'checked':''} onchange=\"scoreData[${i}].on=this.checked;renderScore()\"><span class=\"track\"><span class=\"knob\"><\u002Fspan><\u002Fspan><\u002Flabel>\n        <\u002Fdiv>\n      <\u002Fdiv>`;\n    }).join('');\n  }\n  function applyRamp(){\n    const max = 1200000;\n    scoreData.forEach(r => { r.monto = r.p<=1 ? 0 : Math.round(max * (r.p-1)/9 / 1000)*1000; });\n    renderScore(); syncResumen();\n  }\n\n  // ===== Resumen vivo =====\n  function syncResumen(){\n    const tasa = parseFloat(document.getElementById('f-tasa').value||0);\n    document.getElementById('r-tasa').textContent = tasa.toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2}) + ' %';\n    const cmin = document.getElementById('f-cmin').value, cmax = document.getElementById('f-cmax').value;\n    document.getElementById('r-cuotas').textContent = `${cmin} – ${cmax}`;\n    const gar = parseFloat(document.getElementById('g-monto').value||0);\n    document.getElementById('r-garante').textContent = fmt(gar);\n  }\n\n  // ===== Gasto admin mode =====\n  function setGastoMode(mode){\n    document.querySelectorAll('#seg-gasto button').forEach(b => b.setAttribute('aria-pressed', b.dataset.mode===mode));\n    const pre = document.getElementById('gasto-prefix'), suf = document.getElementById('gasto-suffix');\n    const input = document.getElementById('f-gasto'), hint = document.getElementById('gasto-hint');\n    if (mode==='fijo'){\n      pre.classList.remove('hidden'); suf.classList.add('hidden');\n      input.classList.add('pl-7'); input.classList.remove('pr-9');\n      hint.textContent = 'Monto fijo en pesos que se suma al capital al otorgar el crédito.';\n    } else {\n      pre.classList.add('hidden'); suf.classList.remove('hidden');\n      input.classList.remove('pl-7'); input.classList.add('pr-9');\n      hint.textContent = 'Porcentaje sobre el capital solicitado que se suma al crédito.';\n    }\n  }\n\n  // ===== Banda aprobación =====\n  function syncBand(){\n    let anal = +document.getElementById('a-anal').value;\n    let aprob = +document.getElementById('a-aprob').value;\n    anal = Math.max(0, Math.min(100, anal)); aprob = Math.max(0, Math.min(100, aprob));\n    const band = document.getElementById('approval-band').children;\n    band[0].style.flex = anal;            // rechazado 0..anal\n    band[1].style.flex = Math.max(0,aprob-anal); // analisis\n    band[2].style.flex = Math.max(0,100-aprob);  // aprobado\n    const mkA = document.getElementById('mk-anal'), mkB = document.getElementById('mk-aprob');\n    mkA.style.left = anal+'%'; mkA.dataset.v = anal;\n    mkB.style.left = aprob+'%'; mkB.dataset.v = aprob;\n    document.getElementById('r-aprob').innerHTML = aprob + '<span class=\"text-slate-500 text-base\">/100<\u002Fspan>';\n    document.getElementById('r-anal').innerHTML = anal + '<span class=\"text-slate-500 text-base\">/100<\u002Fspan>';\n  }\n\n  // ===== Semáforo =====\n  function syncSem(){\n    const v = parseFloat(document.getElementById('sem-verde').value||0);\n    const a = parseFloat(document.getElementById('sem-amar').value||0);\n    const bar = document.getElementById('sem-bar').children;\n    const total = Math.max(a*1.6, 0.01);\n    bar[0].style.flex = v;\n    bar[1].style.flex = Math.max(0,a-v);\n    bar[2].style.flex = Math.max(0.02,total-a);\n    document.getElementById('sem-l1').textContent = v.toLocaleString('es-AR',{minimumFractionDigits:2}) + ' verde';\n    document.getElementById('sem-l2').textContent = a.toLocaleString('es-AR',{minimumFractionDigits:2}) + ' amarillo';\n  }\n\n  // ===== Nav: cambio de panel =====\n  const navLinks = document.querySelectorAll('.sec-nav-link');\n  const panels = document.querySelectorAll('.sec');\n  function showPanel(id){\n    panels.forEach(p => p.hidden = (p.id !== id));\n    navLinks.forEach(l => l.classList.toggle('active', l.dataset.target === id));\n    window.scrollTo({ top: 0, behavior: 'smooth' });\n  }\n  navLinks.forEach(l => l.addEventListener('click', () => showPanel(l.dataset.target)));\n  // mobile select\n  const msel = document.getElementById('msel');\n  if (msel) msel.addEventListener('change', () => showPanel(msel.value));\n\n  // ===== Modales =====\n  function openModal(id){ const el=document.getElementById(id); if(el){el.classList.remove('hidden');document.body.style.overflow='hidden';} }\n  function closeModal(id){ const el=document.getElementById(id); if(el){el.classList.add('hidden');document.body.style.overflow='';} }\n  document.querySelectorAll('.modal-backdrop').forEach(b => b.addEventListener('click', e => { if(e.target===b){b.classList.add('hidden');document.body.style.overflow='';} }));\n  document.addEventListener('keydown', e => { if(e.key==='Escape') document.querySelectorAll('[id^=\"m-\"]').forEach(m => {m.classList.add('hidden');document.body.style.overflow='';}); });\n\n  // ===== Toast =====\n  function toast(msg, kind='info'){\n    const wrap=document.getElementById('toast');\n    const colors={ok:'pill-green',info:'pill-blue',warn:'pill-amber',err:'pill-red'};\n    const icons={ok:'check_circle',info:'info',warn:'warning',err:'error'};\n    wrap.innerHTML=`<div class=\"card p-3 flex items-center gap-2 shadow-xl\"><span class=\"pill ${colors[kind]||'pill-blue'}\"><span class=\"material-symbols-outlined\" style=\"font-size:13px\">${icons[kind]||'info'}<\u002Fspan> OK<\u002Fspan><span class=\"text-sm text-slate-200\">${msg}<\u002Fspan><\u002Fdiv>`;\n    wrap.classList.remove('hidden');\n    clearTimeout(window._tT); window._tT=setTimeout(()=>wrap.classList.add('hidden'),2400);\n  }\n\n  // init\n  renderScore(); syncResumen(); syncBand(); syncSem();\n  showPanel('s1');\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
