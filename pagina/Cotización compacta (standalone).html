document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-space: nowrap;\n  word-wrap: normal;\n  direction: ltr;\n  -webkit-font-feature-settings: 'liga';\n  -webkit-font-smoothing: antialiased;\n}\n<\u002Fstyle>\n<style>\n  html, body { font-family: 'Inter', system-ui, sans-serif; }\n  body { background: #0b1220; color: #e2e8f0; }\n  .font-mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }\n  .material-symbols-outlined { font-variation-settings: 'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; vertical-align: middle; line-height: 1; }\n  :focus-visible { outline: 2px solid #60a5fa; outline-offset: 1px; border-radius: 6px; }\n  input[type=\"radio\"], input[type=\"checkbox\"] { accent-color: #3b82f6; }\n\n  /* ---------- App shell: una sola pantalla ---------- */\n  .app { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }\n  .workspace { flex: 1; min-height: 0; display: grid; grid-template-columns: 340px minmax(0,1fr) 366px; gap: 12px; padding: 12px; }\n  @media (max-width: 1180px) {\n    .app { height: auto; overflow: visible; }\n    .workspace { grid-template-columns: 1fr; height: auto; }\n  }\n  .col { min-height: 0; display: flex; flex-direction: column; }\n\n  /* ---------- Cards / panels ---------- */\n  .panel { background: #111827; border: 1px solid #1f2937; border-radius: 14px; display: flex; flex-direction: column; min-height: 0; }\n  .panel-head { padding: .7rem .85rem .55rem; border-bottom: 1px solid #1b2536; display: flex; align-items: center; gap: .55rem; }\n  .panel-body { flex: 1; min-height: 0; overflow-y: auto; padding: .85rem; }\n  .panel-body.tight { padding: .7rem .85rem; }\n  .panel-foot { padding: .7rem .85rem; border-top: 1px solid #1b2536; }\n  .card-sub { background: #0f172a; border: 1px solid #1e2a3d; border-radius: 10px; }\n  .seg { background:#0d1626; border:1px solid #1c2840; border-radius:10px; }\n\n  .num { width: 16px; height: 16px; border-radius: 5px; background: rgba(59,130,246,.16); color: #93c5fd; font-size: 10px; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; }\n\n  /* ---------- Fields ---------- */\n  .field { background: #0f172a; border: 1px solid #243044; color: #e2e8f0; border-radius: 9px; padding: .5rem .65rem; width: 100%; font-size: .85rem; transition: border .15s, box-shadow .15s; }\n  .field:focus { border-color: #3b82f6; outline: none; box-shadow: 0 0 0 3px rgba(59,130,246,.16); }\n  .field:disabled { opacity: .5; }\n  textarea.field { resize: none; }\n  .label { display: block; font-size: .68rem; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; color: #7c8aa3; margin-bottom: .3rem; }\n\n  /* ---------- Buttons ---------- */\n  .btn { display: inline-flex; align-items: center; justify-content: center; gap: .4rem; padding: .55rem .85rem; border-radius: 9px; font-size: .84rem; font-weight: 600; transition: all .15s; min-height: 38px; cursor: pointer; border: 1px solid transparent; white-space: nowrap; }\n  .btn:disabled { opacity: .4; cursor: not-allowed; }\n  .btn-primary  { background: #2563eb; color: #fff; }\n  .btn-primary:hover:not(:disabled){ background: #1d4ed8; }\n  .btn-success  { background: #15803d; color: #fff; }\n  .btn-success:hover:not(:disabled){ background: #166534; }\n  .btn-amber    { background: #d97706; color: #fff; }\n  .btn-amber:hover:not(:disabled){ background: #b45309; }\n  .btn-ghost    { background: transparent; color: #cbd5e1; border-color: #2b3a52; }\n  .btn-ghost:hover { background: #1a2435; color: #fff; }\n  .btn-soft     { background: #18233a; color: #cbd5e1; border-color: #26344c; }\n  .btn-soft:hover { background: #213050; color:#fff; }\n  .btn-xs { padding: .3rem .55rem; min-height: 30px; font-size: .74rem; border-radius: 8px; }\n  .icon-btn { width: 30px; height: 30px; min-height: 0; padding: 0; border-radius: 8px; }\n\n  /* ---------- Pills / chips ---------- */\n  .pill { display: inline-flex; align-items: center; gap: .28rem; padding: .15rem .5rem; border-radius: 999px; font-size: .68rem; font-weight: 600; border: 1px solid transparent; white-space: nowrap; }\n  .pill-green  { background: rgba(16,185,129,.12); color:#34d399; border-color: rgba(16,185,129,.3); }\n  .pill-amber  { background: rgba(245,158,11,.12); color:#fbbf24; border-color: rgba(245,158,11,.3); }\n  .pill-red    { background: rgba(239,68,68,.12);  color:#f87171; border-color: rgba(239,68,68,.3); }\n  .pill-blue   { background: rgba(59,130,246,.12); color:#60a5fa; border-color: rgba(59,130,246,.3); }\n  .pill-slate  { background: rgba(148,163,184,.1); color:#cbd5e1; border-color: rgba(148,163,184,.22); }\n\n  /* ---------- Medios filter chips (checkbox toggles) ---------- */\n  .medio-chip { position: relative; display: inline-flex; align-items: center; gap: .35rem; padding: .35rem .6rem; border-radius: 999px; font-size: .76rem; font-weight: 500; cursor: pointer; border: 1px solid #26344c; background: #131e30; color: #93a2b8; transition: all .14s; user-select: none; }\n  .medio-chip .dot { width: 7px; height: 7px; border-radius: 999px; background: #475569; transition: all .14s; }\n  .medio-chip:has(input:checked) { background: rgba(59,130,246,.12); border-color: rgba(59,130,246,.45); color: #dbe7fb; }\n  .medio-chip:has(input:checked) .dot { background: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.18); }\n  .medio-chip input { position: absolute; opacity: 0; pointer-events: none; }\n\n  /* ---------- Payment result tiles ---------- */\n  .pay-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }\n  .pay { position: relative; border: 1px solid #1f2937; background: #0f172a; border-radius: 12px; padding: .7rem .75rem; display: flex; flex-direction: column; gap: .5rem; cursor: pointer; transition: all .15s; }\n  .pay:hover { border-color: #334155; transform: translateY(-1px); }\n  .pay.best { border-color: rgba(16,185,129,.5); background: linear-gradient(180deg, rgba(16,185,129,.07), rgba(15,23,42,.4)); }\n  .pay.off  { opacity: .62; cursor: default; }\n  .pay.off:hover { transform: none; border-color: #1f2937; }\n  .pay-ico { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; shrink: 0; }\n  .pay-amount { font-family: 'JetBrains Mono', ui-monospace, monospace; font-variant-numeric: tabular-nums; font-weight: 600; letter-spacing: -.01em; }\n  .pay-meta { display: grid; grid-template-columns: 1fr 1fr; gap: .15rem .5rem; }\n  .pay-meta .k { font-size: .6rem; text-transform: uppercase; letter-spacing: .04em; color: #64748b; }\n  .pay-meta .v { font-size: .76rem; color: #cbd5e1; font-weight: 500; }\n\n  /* ---------- Cart rows ---------- */\n  .cart-row { border: 1px solid #1e2a3d; background: #0f172a; border-radius: 10px; padding: .55rem .6rem; display: flex; flex-direction: column; gap: .5rem; }\n  .mini { background:#0b1220; border:1px solid #243044; border-radius:7px; color:#e2e8f0; font-size:.78rem; padding:.28rem .4rem; text-align:right; font-family:'JetBrains Mono',monospace; }\n  .mini:focus { outline:none; border-color:#3b82f6; }\n  .qty-step { display:inline-flex; align-items:center; border:1px solid #243044; border-radius:8px; overflow:hidden; background:#0b1220; }\n  .qty-step button { width:26px; height:28px; color:#94a3b8; font-size:14px; display:flex; align-items:center; justify-content:center; }\n  .qty-step button:hover { background:#1a2435; color:#fff; }\n  .qty-step input { width:34px; text-align:center; background:transparent; border:0; color:#fff; font-size:.8rem; font-family:'JetBrains Mono',monospace; }\n  .qty-step input:focus { outline:none; }\n\n  /* ---------- Results comparison table ---------- */\n  .rtable { width:100%; border-collapse:separate; border-spacing:0; font-size:.82rem; }\n  .rtable thead th { text-align:left; font-size:.62rem; text-transform:uppercase; letter-spacing:.05em; color:#64748b; font-weight:600; padding:.45rem .6rem; position:sticky; top:0; z-index:1; background:#111827; border-bottom:1px solid #1b2536; }\n  .rtable thead th.r, .rtable td.r { text-align:right; }\n  .rtable td { padding:.5rem .6rem; border-bottom:1px solid #16202f; vertical-align:middle; }\n  .rtable tbody tr { cursor:pointer; transition:background .12s; }\n  .rtable tbody tr:hover td { background:#0f1a2b; }\n  .rtable tr.best td { background:rgba(16,185,129,.06); }\n  .rtable tr.best:hover td { background:rgba(16,185,129,.1); }\n  .rtable tr.off { cursor:default; color:#64748b; }\n  .rtable tr.off:hover td { background:transparent; }\n  .rmedio { display:flex; align-items:center; gap:.5rem; }\n  .rmedio .pay-ico { width:26px; height:26px; }\n  /* expandable rows */\n  .rtable tr.parent { cursor:pointer; }\n  .rtable .twist { font-size:16px; color:#64748b; transition:transform .2s; margin-left:.15rem; }\n  .rtable tr.parent[aria-expanded=\"true\"] .twist { transform:rotate(180deg); color:#93c5fd; }\n  .rtable tr.parent[aria-expanded=\"true\"] > td { background:#0f1a2b; }\n  .rtable tr.detail > td { background:#0c1424; border-bottom:1px solid #131f2e; padding-top:.4rem; padding-bottom:.4rem; }\n  .rtable tr.detail:hover > td { background:#101b2d; }\n  .rtable tr.detail.cheap > td { box-shadow: inset 3px 0 0 #10b981; }\n  .plan-medio { display:flex; align-items:center; gap:.5rem; padding-left:1.7rem; }\n  .ent-dot { width:7px; height:7px; border-radius:2px; flex:none; }\n  .total-display { font-family: 'JetBrains Mono', ui-monospace, monospace; font-variant-numeric: tabular-nums; letter-spacing: -.01em; }\n  .dropdown-list { background: #0f172a; border: 1px solid #243044; border-radius: 10px; box-shadow: 0 18px 50px rgba(0,0,0,.45); max-height: 260px; overflow-y: auto; }\n  .dropdown-item { padding: .5rem .7rem; cursor: pointer; transition: background .12s; }\n  .dropdown-item:hover, .dropdown-item.active { background: #1e293b; }\n  .truncate-1 { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }\n  details > summary { list-style: none; cursor: pointer; }\n  details > summary::-webkit-details-marker { display: none; }\n  details[open] .chev { transform: rotate(180deg); }\n  .chev { transition: transform .2s; }\n  .panel-body::-webkit-scrollbar, .dropdown-list::-webkit-scrollbar { width: 8px; }\n  .panel-body::-webkit-scrollbar-thumb { background: #1e2a3d; border-radius: 8px; }\n  .modal-card { animation: fadeIn .18s ease; }\n  @keyframes fadeIn { from { opacity:0; transform: translateY(8px);} to { opacity:1; transform: translateY(0);} }\n  .hr { height:1px; background:#1b2536; border:0; margin:.7rem 0; }\n<\u002Fstyle>\n<\u002Fhead>\n<body data-cotizacion-simulador=\"\" data-simular-url=\"/cotizacion/simular\" data-guardar-url=\"/cotizacion/guardar\" data-productos-url=\"/cotizacion/productos\" data-producto-resumen-url=\"/cotizacion/producto-resumen\" data-clientes-url=\"/cotizacion/clientes\">\n\n<!-- ============================ FEEDBACK ============================ -->\n\n\n<div id=\"cotizacion-feedback\" class=\"hidden fixed top-3 right-3 z-[60] max-w-sm\" aria-live=\"polite\"><\u002Fdiv>\n\n<div class=\"app\">\n\n  <!-- ============================ TOP BAR ============================ -->\n  <header class=\"shrink-0 border-b border-slate-800 bg-slate-950/50 px-4 py-2.5 flex items-center gap-4\">\n    <div class=\"flex items-center gap-2.5 min-w-0\">\n      <div class=\"w-8 h-8 rounded-lg bg-blue-500/10 border border-blue-500/30 flex items-center justify-center shrink-0\">\n        <span class=\"material-symbols-outlined text-blue-400\" style=\"font-size:20px\">calculate<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"min-w-0\">\n        <div class=\"flex items-center gap-2\">\n          <h1 class=\"text-base font-semibold text-white tracking-tight leading-none\">Cotización<\u002Fh1>\n          <span id=\"estado-banner\" class=\"pill pill-green\"><span class=\"material-symbols-outlined\" style=\"font-size:13px\">check_circle<\u002Fspan> Simulada correctamente<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"text-[11px] text-slate-500 leading-none mt-1 f / WhatsApp\" aria-label=\"Teléfono libre\">\n                <p class=\"text-[10px] text-slate-500\">Se guarda si no hay cliente de sistema seleccionado.<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdetails>\n          <\u002Fdiv>\n\n          <hr class=\"hr\">\n\n          <!-- Descuentos generales -->\n          <div>\n            <h3 class=\"text-sm font-semibold text-white flex items-center gap-1.5\">\n              <span class=\"material-symbols-outlined text-slate-400\" style=\"font-size:17px\">sell<\u002Fspan> Descuentos generales\n            <\u002Fh3>\n            <p class=\"text-[10px] text-slate-500 mt-0.5\">Se aplican al total antes de calcular medios.<\u002Fp>\n            <div class=\"mt-2 grid grid-cols-2 gap-2\">\n              <div>\n                <label for=\"cotizacion-descuento-gral-pct\" class=\"label\">% Porcentaje<\u002Flabel>\n                <div class=\"relative\">\n                  <input id=\"cotizacion-descuento-gral-pct\" type=\"number\" min=\"0\" max=\"100\" value=\"0\" class=\"field pr-6\">\n                  <span class=\"absolute right-2.5 top-1/2 -translate-y-1/2 text-slate-500 text-sm\">%<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div>\n                <label for=\"cotizacion-descuento-gral-importe\" class=\"label\">$ Importe<\u002Flabel>\n                <div class=\"relative\">\n                  <span class=\"absolute left-2.5 top-1/2 -translate-y-1/2 text-slate-500 text-sm\">$<\u002Fspan>\n                  <input id=\"cotizacion-descuento-gral-importe\" type=\"number\" min=\"0\" value=\"0\" class=\"field pl-6\">\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div data-descuentos-ambos=\"\" class=\"hidden mt-2 rounded-lg border border-amber-500/40 bg-amber-500/5 p-2 text-[11px] text-amber-100/90 flex gap-1.5\">\n              <span class=\"material-symbols-outlined text-amber-300 shrink-0\" style=\"font-size:14px\">warning<\u002Fspan>\n              Se sumarán ambos descuentos.\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <hr class=\"hr\">\n\n          <!-- Vencimiento + observaciones -->\n          <div>\n            <h3 class=\"text-sm font-semibold text-white flex items-center gap-1.5\">\n              <span class=\"material-symbols-outlined text-slate-400\" style=\"font-size:17px\">event<\u002Fspan> Vencimiento y notas\n            <\u002Fh3>\n            <div class=\"mt-2 space-y-2\">\n              <div>\n                <label for=\"cotizacion-fecha-vencimiento\" class=\"label\">Válida hasta<\u002Flabel>\n                <input id=\"cotizacion-fecha-vencimiento\" type=\"date\" class=\"field\">\n              <\u002Fdiv>\n              <div>\n                <label for=\"cotizacion-observaciones\" class=\"label\">Observaciones<\u002Flabel>\n                <textarea id=\"cotizacion-observaciones\" rows=\"2\" class=\"field\" placeholder=\"Notas internas opcionales…\"><\u002Ftextarea>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Acciones (fijas) -->\n        <div class=\"panel-foot\">\n          <div class=\"flex items-center justify-between mb-2\">\n            <span class=\"text-[11px] text-slate-500\">Total base<\u002Fspan>\n            <span class=\"text-lg font-semibold text-white total-display\" data-side-total=\"\">$10.000,00<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"grid grid-cols-2 gap-2\">\n            <button id=\"cotizacion-simular\" class=\"btn btn-primary\">\n              <span class=\"material-symbols-outlined\" style=\"font-size:18px\">play_arrow<\u002Fspan> Simular\n            <\u002Fbutton>\n            <button id=\"cotizacion-guardar\" class=\"btn btn-success\" onclick=\"openModal('modal-guardar')\">\n              <span class=\"material-symbols-outlined\" style=\"font-size:18px\">bookmark_add<\u002Fspan> Guardar\n            <\u002Fbutton>\n          <\u002Fdiv>\n          <p id=\"cotizacion-simular-estado\" class=\"mt-1.5 text-[11px] text-emerald-400 text-center flex items-center justify-center gap-1\">\n            <span class=\"material-symbols-outlined\" style=\"font-size:13px\">check_circle<\u002Fspan> Simulación lista.\n          <\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============================ MODAL: GUARDAR ============================ -->\n<div id=\"modal-guardar\" class=\"hidden fixed inset-0 z-50 bg-black/60 backdrop-blur-sm overflow-y-auto\" onclick=\"if(event.target===this)closeModal('modal-guardar')\" role=\"dialog\" aria-modal=\"true\" aria-labelledby=\"guardar-title\">\n  <div class=\"min-h-full flex items-center justify-center p-4\">\n    <div class=\"modal-card panel w-full max-w-lg\">\n      <div class=\"panel-head\">\n        <h3 id=\"guardar-title\" class=\"text-sm font-semibold text-white\">Guardar cotización<\u002Fh3>\n        <button onclick=\"closeModal('modal-guardar')\" aria-label=\"Cerrar\" class=\"icon-btn btn btn-ghost ml-auto\"><span class=\"material-symbols-outlined text-slate-400\" style=\"font-size:18px\">close<\u002Fspan><\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"p-4\">\n        <dl class=\"card-sub p-3 space-y-2 text-sm\">\n          <div class=\"flex justify-between\"><dt class=\"text-slate-400\">Cliente<\u002Fdt><dd class=\"text-white\">—<\u002Fdd><\u002Fdiv>\n          <div class=\"flex justify-between\"><dt class=\"text-slate-400\">Productos<\u002Fdt><dd class=\"text-white\">1 ítem · 1 unidad<\u002Fdd><\u002Fdiv>\n          <div class=\"flex justify-between\"><dt class=\"text-slate-400\">Total base<\u002Fdt><dd class=\"text-white font-semibold font-mono\">$10.000,00<\u002Fdd><\u002Fdiv>\n          <div class=\"flex justify-between\"><dt class=\"text-slate-400\">Mejor opción<\u002Fdt><dd class=\"text-emerald-400\">Efectivo · $10.000,00<\u002Fdd><\u002Fdiv>\n        <\u002Fdl>\n        <div class=\"mt-3 rounded-lg border border-amber-500/40 bg-amber-500/5 p-2.5 text-xs text-amber-100/90 flex gap-2\">\n          <span class=\"material-symbols-outlined text-amber-300 shrink-0\" style=\"font-size:16px\">warning<\u002Fspan>\n          Guardar no crea venta, no registra caja y no modifica stock.\n        <\u002Fdiv>\n        <div class=\"mt-4 flex justify-end gap-2\">\n          <button class=\"btn btn-ghost\" onclick=\"closeModal('modal-guardar')\">Cancelar<\u002Fbutton>\n          <button class=\"btn btn-success\" onclick=\"closeModal('modal-guardar'); setQuoteState('saved'); showFeedback('Cotización guardada','success')\">\n            <span class=\"material-symbols-outlined\" style=\"font-size:18px\">bookmark_add<\u002Fspan> Guardar\n          <\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============================ MODAL: PLAN DETAIL ============================ -->\n<div id=\"modal-plan\" class=\"hidden fixed inset-0 z-50\" role=\"dialog\" aria-modal=\"true\" aria-labelledby=\"plan-title\">\n  <div class=\"absolute inset-0 bg-black/60 backdrop-blur-sm\" onclick=\"closeModal('modal-plan')\"><\u002Fdiv>\n  <aside class=\"absolute right-0 top-0 h-full w-full sm:w-[420px] bg-slate-950 border-l border-slate-800 shadow-2xl flex flex-col\">\n    <header class=\"px-4 py-3.5 border-b border-slate-800 flex items-start justify-between gap-3\">\n      <div>\n        <div class=\"text-[11px] text-slate-500 uppercase tracking-wide\">Detalle del plan<\u002Fdiv>\n        <h3 id=\"plan-title\" class=\"text-base font-semibold text-white\"><span id=\"plan-medio\">—<\u002Fspan> · <span id=\"plan-cuotas\">—<\u002Fspan><\u002Fh3>\n      <\u002Fdiv>\n      <button onclick=\"closeModal('modal-plan')\" aria-label=\"Cerrar\" class=\"icon-btn btn btn-ghost\"><span class=\"material-symbols-outlined text-slate-400\" style=\"font-size:18px\">close<\u002Fspan><\u002Fbutton>\n    <\u002Fheader>\n    <div class=\"flex-1 overflow-y-auto p-4 space-y-3\">\n      <div class=\"card-sub p-3.5\">\n        <div class=\"text-xs text-slate-500\">Total final<\u002Fdiv>\n        <div class=\"mt-1 text-3xl font-semibold text-white total-display\">$10.000,00<\u002Fdiv>\n      <\u002Fdiv>\n      <dl class=\"space-y-2 text-sm\">\n        <div class=\"flex justify-between\"><dt class=\"text-slate-400\">Cantidad de cuotas<\u002Fdt><dd class=\"text-white\">Pago único<\u002Fdd><\u002Fdiv>\n        <div class=\"flex justify-between\"><dt class=\"text-slate-400\">Valor de cuota<\u002Fdt><dd class=\"text-white font-mono\">—<\u002Fdd><\u002Fdiv>\n        <div class=\"flex justify-between\"><dt class=\"text-slate-400\">Recargo total<\u002Fdt><dd class=\"text-emerald-400 font-mono\">0%<\u002Fdd><\u002Fdiv>\n      <\u002Fdl>\n      <div class=\"card-sub p-3.5\">\n        <h4 class=\"text-sm font-medium text-white flex items-center gap-2\"><span class=\"material-symbols-outlined text-slate-400\" style=\"font-size:17px\">rule<\u002Fspan> Condiciones<\u002Fh4>\n        <ul class=\"mt-2 text-xs text-slate-300 space-y-1 list-disc list-inside marker:text-slate-600\">\n          <li>Plan vigente a la fecha de simulación.<\u002Fli>\n          <li>Sujeto a aprobación del emisor.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <footer class=\"px-4 py-3.5 border-t border-slate-800 flex gap-2 justify-end\">\n      <button class=\"btn btn-ghost\" onclick=\"closeModal('modal-plan')\">Cerrar<\u002Fbutton>\n      <button class=\"btn btn-primary\" onclick=\"closeModal('modal-plan'); showFeedback('Opción destacada en la cotización','success')\">\n        <span class=\"material-symbols-outlined\" style=\"font-size:18px\">star<\u002Fspan> Destacar\n      <\u002Fbutton>\n    <\u002Ffooter>\n  <\u002Faside>\n<\u002Fdiv>\n\n<!-- ============================ MODAL: QUITAR PRODUCTO ============================ -->\n<div id=\"modal-quitar-producto\" class=\"hidden fixed inset-0 z-50 bg-black/60 backdrop-blur-sm overflow-y-auto\" onclick=\"if(event.target===this)closeModal('modal-quitar-producto')\" role=\"dialog\" aria-modal=\"true\" aria-labelledby=\"quitar-title\">\n  <div class=\"min-h-full flex items-center justify-center p-4\">\n    <div class=\"modal-card panel w-full max-w-md p-4\">\n      <div class=\"flex items-start gap-3\">\n        <div class=\"w-9 h-9 rounded-lg bg-red-500/10 border border-red-500/30 flex items-center justify-center shrink-0\">\n          <span class=\"material-symbols-outlined text-red-400\" style=\"font-size:20px\">warning<\u002Fspan>\n        <\u002Fdiv>\n        <div>\n          <h3 id=\"quitar-title\" class=\"text-base font-semibold text-white\">Quitar producto<\u002Fh3>\n          <p class=\"text-sm text-slate-400 mt-0.5\">Los resultados simulados quedarán desactualizados.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"mt-4 flex justify-end gap-2\">\n        <button class=\"btn btn-ghost\" onclick=\"closeModal('modal-quitar-producto')\">Cancelar<\u002Fbutton>\n        <button class=\"btn btn-amber\" onclick=\"closeModal('modal-quitar-producto'); setQuoteState('pending'); showFeedback('Producto quitado · Volvé a simular','amber')\">\n          <span class=\"material-symbols-outlined\" style=\"font-size:18px\">delete<\u002Fspan> Quitar\n        <\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============================ SCRIPT ============================ -->\n<script>\n  // ---- Steppers ----\n  function stepQty(id, d){ const el=document.getElementById(id); if(!el) return; el.value=Math.max(1,(parseInt(el.value)||1)+d); el.dispatchEvent(new Event('input',{bubbles:true})); }\n  function stepRow(btn, d){ const inp=btn.parentElement.querySelector('input'); if(!inp) return; inp.value=Math.max(1,(parseInt(inp.value)||1)+d); inp.dispatchEvent(new Event('input',{bubbles:true})); }\n\n  // ---- Quote state ----\n  function setQuoteState(state){\n    const cfg = {\n      idle:      { pill:'pill-slate', dot:'bg-slate-500',   label:'Sin simular',        hint:'Listo para simular.',                   hintCls:'text-slate-400',   icon:'info',          banner:'Cotización sin simular' },\n      simulated: { pill:'pill-green', dot:'bg-emerald-400', label:'Simulada',           hint:'Simulación lista.',                     hintCls:'text-emerald-400', icon:'check_circle',  banner:'Simulada correctamente' },\n      pending:   { pill:'pill-amber', dot:'bg-amber-400',   label:'Cambios pendientes', hint:'Cambios pendientes: volvé a simular.',  hintCls:'text-amber-300',   icon:'warning',       banner:'Cambios sin simular' },\n      error:     { pill:'pill-red',   dot:'bg-red-400',     label:'Error',              hint:'No se pudo simular.',                   hintCls:'text-red-300',     icon:'error',         banner:'Error de simulación' },\n      saved:     { pill:'pill-green', dot:'bg-emerald-400', label:'Guardada',           hint:'Cotización guardada.',                  hintCls:'text-emerald-400', icon:'bookmark_added',banner:'Cotización guardada' },\n    };\n    const s = cfg[state]; if(!s) return;\n    const resPill = document.getElementById('resultados-status-pill');\n    if(resPill){ resPill.className='pill '+s.pill; resPill.innerHTML='<span class=\"w-1.5 h-1.5 rounded-full '+s.dot+'\"><\u002Fspan> '+s.label; }\n    const banner = document.getElementById('estado-banner');\n    if(banner){ banner.className='pill '+s.pill; banner.innerHTML='<span class=\"material-symbols-outlined\" style=\"font-size:13px\">'+s.icon+'<\u002Fspan> '+s.banner; }\n    const hint = document.getElementById('cotizacion-simular-estado');\n    if(hint){ hint.className='mt-1.5 text-[11px] text-center flex items-center justify-center gap-1 '+s.hintCls; hint.innerHTML='<span class=\"material-symbols-outlined\" style=\"font-size:13px\">'+s.icon+'<\u002Fspan> '+s.hint; }\n  }\n  window.setQuoteState = setQuoteState;\n\n  // ---- Modals ----\n  function openModal(id){ const el=document.getElementById(id); if(!el) return; el.classList.remove('hidden'); document.body.style.overflow='hidden'; }\n  function closeModal(id){ const el=document.getElementById(id); if(!el) return; el.classList.add('hidden'); document.body.style.overflow=''; }\n  document.addEventListener('keydown', e=>{ if(e.key==='Escape'){ ['modal-guardar','modal-plan','modal-quitar-producto'].forEach(id=>{const el=document.getElementById(id); if(el&&!el.classList.contains('hidden')) closeModal(id);}); } });\n  function openPlanDetail(medio, cuotas){ document.getElementById('plan-medio').textContent=medio; document.getElementById('plan-cuotas').textContent=cuotas; openModal('modal-plan'); }\n\n  // ---- Expandable rows (desglose por entidad) ----\n  function toggleGroup(key, tr){\n    const open = tr.getAttribute('aria-expanded')==='true';\n    tr.setAttribute('aria-expanded', open ? 'false' : 'true');\n    document.querySelectorAll('tr.detail[data-g=\"'+key+'\"]').forEach(r => r.hidden = open);\n  }\n  window.toggleGroup = toggleGroup;\n\n  // ---- Feedback toast ----\n  function showFeedback(msg, kind){\n    const el=document.getElementById('cotizacion-feedback');\n    const cls = kind==='success' ? 'bg-emerald-600/15 border-emerald-600/40 text-emerald-200'\n              : kind==='amber'   ? 'bg-amber-600/15 border-amber-600/40 text-amber-200'\n              : kind==='error'   ? 'bg-red-600/15 border-red-600/40 text-red-200'\n              :                    'bg-slate-800 border-slate-700 text-slate-200';\n    el.className='fixed top-3 right-3 z-[60] max-w-sm border rounded-lg px-4 py-3 text-sm shadow-xl '+cls;\n    el.textContent=msg; clearTimeout(showFeedback._t);\n    showFeedback._t=setTimeout(()=>el.classList.add('hidden'),3200);\n  }\n\n  // ---- Descuento doble ----\n  function watchDescuentos(){\n    const pct=parseFloat(document.getElementById('cotizacion-descuento-gral-pct').value)||0;\n    const imp=parseFloat(document.getElementById('cotizacion-descuento-gral-importe').value)||0;\n    const aviso=document.querySelector('[data-descuentos-ambos]');\n    if(aviso) aviso.classList.toggle('hidden', !(pct>0&&imp>0));\n  }\n  ['cotizacion-descuento-gral-pct','cotizacion-descuento-gral-importe'].forEach(id=>{\n    const el=document.getElementById(id); if(el) el.addEventListener('input',watchDescuentos);\n  });\n\n  // El botón cotizacion-simular y los medios (data-cotizacion-medio) los maneja cotizacion-simulador.js\n  setQuoteState('simulated');\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
